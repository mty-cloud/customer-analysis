name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib seaborn scikit-learn openpyxl pyinstaller
    
    - name: Generate sample data
      run: |
        python generate_sample_data.py
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="CustomerAnalysis" --add-data="airline_customers.csv;." customer_analysis_app.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: CustomerAnalysis
        path: dist/CustomerAnalysis.exe
